name: Apex Wealth Lab Automation Engine

on:
  schedule:
    # This triggers the script 3 times a day at high-value times (14:00, 18:00, and 22:00 UTC)
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # This allows you to also run it manually anytime with a button click

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install FFmpeg (For Video Editing & Clipping)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Script Dependencies
      run: |
        python -m pip install --upgrade pip
        # We will add libraries like google-generativeai, edge-tts, and requests here later
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Automation Engine
      env:
        # This securely passes your hidden API keys into the script when it runs
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      run: |
        # This will look for your main Python script to execute
        python main.py
