name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 7 * * *'  # Runs every day at 07:00 UTC
    - cron: '0 14 * * *' # Runs every day at 14:00 UTC
    - cron: '0 21 * * *' # Runs every day at 21:00 UTC

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

        - name: Install System Dependencies for Video Editing
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Fix the default security policy that blocks MoviePy text rendering
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Install Dependencies Manually
        run: |
          python -m pip install --upgrade pip
          # We force Pillow 9.5.0 so old MoviePy can find the ANTIALIAS attribute
          pip install google-generativeai requests edge-tts "Pillow==9.5.0" moviepy==1.0.3

      - name: Run Autopilot Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # New ElevenLabs credentials
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }} # Optional: omit if you want to use the default narrator voice
        run: |
          echo "=== BYPASSING INVISIBLE CHARACTERS ==="
          REAL_FILE=$(ls | grep -E '^main\.py')
          
          if [ -n "$REAL_FILE" ]; then
            echo "Successfully targeted raw filename: '$REAL_FILE'"
            python -u "$REAL_FILE"
          else
            echo "Could not resolve the file."
            exit 1
          fi
