name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies Manually
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests edge-tts moviepy

      - name: Run Engine Directly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          # If main.py is in the root, run it. Otherwise, find it anywhere.
          if [ -f "main.py" ]; then
            python main.py
          else
            EXEC_PATH=$(find . -maxdepth 3 -name "main.py" | head -n 1)
            echo "Executing via found path: $EXEC_PATH"
            python "$EXEC_PATH"
          fi
