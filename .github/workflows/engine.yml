name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 7 * * *'  # Runs every day at 07:00 UTC
    - cron: '0 14 * * *' # Runs every day at 14:00 UTC
    - cron: '0 21 * * *' # Runs every day at 21:00 UTC

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies Manually
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests edge-tts moviepy

      - name: Run Engine via Partial Match
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "=== BYPASSING INVISIBLE CHARACTERS ==="
          # Matches 'main.py' even with hidden trailing Unicode text
          REAL_FILE=$(ls | grep -E '^main\.py')
          
          if [ -n "$REAL_FILE" ]; then
            echo "Successfully targeted raw filename: '$REAL_FILE'"
            python "$REAL_FILE"
          else
            echo "Could not resolve the file."
            exit 1
          fi
