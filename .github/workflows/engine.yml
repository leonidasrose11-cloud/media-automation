name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies Manually
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests edge-tts moviepy

      - name: Locate and Execute script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "=== ABSOLUTE SEARCH ==="
          # Find the exact full system path of main.py
          REAL_PATH=$(find /home/runner/work/ -name "main.py" | head -n 1)
          
          if [ -n "$REAL_PATH" ]; then
            echo "Found absolute path at: $REAL_PATH"
            # Move to the directory where it belongs so it can find its assets
            cd $(dirname "$REAL_PATH")
            python main.py
          else
            echo "=== EMERGENCY FILE TREE ==="
            find /home/runner/work/ -maxdepth 4
            exit 1
          fi
