name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: # Keeps your manual "Run workflow" button active for testing
  schedule:
    - cron: '0 7 * * *'  # Run 1: 08:00 AM Algeria Time (Morning Commute Slot)
    - cron: '0 14 * * *' # Run 2: 03:00 PM Algeria Time (US Morning / Local Afternoon)
    - cron: '0 21 * * *' # Run 3: 10:00 PM Algeria Time (Prime-Time US/Canada Scrolling)

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py
