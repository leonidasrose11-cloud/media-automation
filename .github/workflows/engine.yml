name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Inspect Live Files
        run: |
          echo "=== ACTUAL MAIN BRANCH FILES ==="
          ls -R
          echo "================================"

      - name: Run Engine Safely
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          TARGET=$(find . -name "main.py" -o -name "Main.py" | head -n 1)
          if [ -n "$TARGET" ]; then
            echo "Launching from: $TARGET"
            python "$TARGET"
          else
            echo "ERROR: main.py genuinely does not exist anywhere on the main branch!"
            exit 1
          fi
