name: Apex Wealth Lab Autopilot Engine

on:
  schedule:
    - cron: '0 6,13,20 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai edge-tts requests google-api-python-client google-auth-oauthlib google-auth-httplib2

    - name: Run Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      # 🎯 This automatically hunts down main.py and switches to its folder instantly
      run: |
        TARGET_FILE=$(find . -name "main.py" -print -quit)
        if [ -z "$TARGET_FILE" ]; then
          echo "ERROR: Could not find main.py anywhere in the repository!"
          exit 1
        fi
        TARGET_DIR=$(dirname "$TARGET_FILE")
        cd "$TARGET_DIR"
        python main.py
