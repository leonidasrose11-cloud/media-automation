name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 7 * * *'  
    - cron: '0 14 * * *' 
    - cron: '0 21 * * *' 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests edge-tts moviepy

      - name: Map Files and Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "=== WHERE ARE THE FILES? ==="
          ls -R
          echo "============================"
          MAIN_PATH=$(find . -name "main.py" | head -n 1)
          if [ -n "$MAIN_PATH" ]; then
            python "$MAIN_PATH"
          else
            echo "CRITICAL ERROR: main.py is completely missing from this commit snapshot!"
            exit 1
          fi

