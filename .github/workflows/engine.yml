name: Apex Wealth Lab Autopilot Engine

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 7 * * *'  
    - cron: '0 14 * * *' 
    - cron: '0 21 * * *' 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Force Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main # This completely forces it to pull your real files, no matter what!

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests edge-tts moviepy

      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py
