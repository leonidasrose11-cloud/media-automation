name: Apex Wealth Lab Autopilot Engine

on:
  schedule:
    - cron: '0 6,13,20 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai edge-tts requests google-api-python-client google-auth-oauthlib google-auth-httplib2

    - name: Run Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      run: |
        echo "=== Correcting potential hidden spacing bugs ==="
        # This hunts down any variation of main.py and forces it to a clean filename
        find . -type f -name "main*.py*" -exec mv {} main.py \; 2>/dev/null || true
        
        echo "=== Verifying clean file list ==="
        ls -la
        
        echo "=== Executing Automation Script ==="
        python main.py
